<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Correct viewport tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login – Windsor Sportsmen’s Club</title>

    <!-- =========================================================
         PAGE STYLESHEETS
    ========================================================== -->
     <!-- Nav styles -->
    <link rel="stylesheet" href="styles/nav.css">
    <!-- Air Rifle styles -->
    <link rel="stylesheet" href="styles.css?v=7">
    <!-- Footer styles -->
    <link rel="stylesheet" href="styles/footer.css">
    
</head>

<body class="login-bg">

    <!-- =========================================================
         NAVIGATION (LOADED FROM /components/nav.html)
    ========================================================== -->
    <div id="nav-placeholder"></div>
    <script src="scripts/load-nav.js"></script>

<main>
    <section class="content-section login-page-wrapper">
        <form class="login-form">
            <label>Username</label>
            <input type="text" placeholder="Enter username">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <button type="submit" class="login-btn">Log In</button>

            <div class="login-links">
                <a href="#">Forgot your password?</a>
                <a href="#">Forgot your username?</a>
            </div>
        </form>
    </section>
</main>

<!-- ⭐ FOOTER -->
<div id="footer-placeholder"></div>
<script src="scripts/load-footer.js"></script>
    
<script src="scripts.js"></script>
</body>
</html>
